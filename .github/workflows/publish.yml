name: Publish to Modrinth & Auto-Update

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Sync mod version to tag
        run: |
          VERSION="${{ github.ref_name }}"
          MOD_VERSION="${VERSION#v}"
          sed -i "s/^mod_version=.*/mod_version=$MOD_VERSION/" gradle.properties
          echo "mod_version set to $MOD_VERSION"

      - name: Build mod
        run: ./gradlew clean build

      - name: Rename JAR for release
        run: |
          MAIN_JAR=$(find build/libs -name "*.jar" -not -name "*-sources.jar" -not -name "*-dev.jar" | head -n 1)
          if [ -z "$MAIN_JAR" ]; then
            echo "❌ No JAR file found!"
            ls -la build/libs/
            exit 1
          fi
          cp "$MAIN_JAR" build/libs/customitemsk.jar
          echo "✅ JAR ready: build/libs/customitemsk.jar"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/customitemsk.jar
          name: CustomItemsK ${{ github.ref_name }}
          body: |
            ## CustomItemsK ${{ github.ref_name }}
            
            ### Installation
            1. Download `customitemsk.jar` below
            2. Place it in your `mods` folder  
            3. Restart Minecraft
            
            ### Auto-Update
            If you have the connector installed, restart Minecraft to get the update automatically!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version.json
        run: |
          VERSION="${{ github.ref_name }}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/customitemsk.jar"
          
          cat > version.json << EOF
          {
            "version": "$VERSION",
            "downloadUrl": "$DOWNLOAD_URL",
            "lastUpdated": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "changelog": "https://github.com/${{ github.repository }}/releases/tag/$VERSION"
          }
          EOF
          
          echo "Updated version.json:"
          cat version.json

      - name: Commit and push version.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add version.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update version.json to ${{ github.ref_name }}"
            git push origin main
          fi

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: CebpedZK
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: build/libs/customitemsk.jar
          name: CustomItemsK ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: release
          loaders: fabric
          game-versions: 1.21.11
          dependencies: |
            fabric-api | required
